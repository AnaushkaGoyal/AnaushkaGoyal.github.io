<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PA Signals | Maps | Anaushka Goyal</title>

  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="stylesheet" href="/assets/project.css" />
  <link rel="stylesheet" href="/assets/maps.css" />
</head>

<body class="mapDetailPage">
  <header class="topbar">
    <a class="brand" href="/" aria-label="Home">AG</a>
    <!-- removed Projects / Maps / About -->
  </header>

  <main class="mapDetail">
    <!-- LEFT: big map -->
    <section class="mapPane" aria-label="Map view">
      <img class="mapImage" src="./map.jpg" alt="PA Signals map" />
    </section>

    <!-- RIGHT: text + skill boxes -->
    <aside class="infoPane" aria-label="Map details">
      <a class="backLink" href="/maps/">← Back to Maps</a>

      <h1 class="mapH1">Indego Bike Station Trip Start Stations</h1>
      <p class="mapP">
        This map visualizes Indego bike stations with frequency of trip starts.
      </p>

      <div class="skillsBlock" aria-label="Skills used">
        <div class="skillsLabel">Skills used</div>
        <div class="chips">
          <span class="chip">Cartographic design</span>
          <span class="chip">Data Analysis</span>
          <span class="chip">Spatial Joins</span>
        </div>
      </div>

      <div class="skillsBlock" aria-label="Methods">
        <div class="skillsLabel">Methods</div>
        <div class="chips">
          <span class="chip">Classification</span>
          <span class="chip">Census Data</span>
        </div>
      </div>

      <div class="skillsBlock" aria-label="Tools">
        <div class="skillsLabel">Tools</div>
        <div class="chips">
          <span class="chip">ArcGIS</span>
          <span class="chip">R-Studio</span>
        </div>
      </div>
    </aside>
  </main>
</body>
</html>
