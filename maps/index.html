<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Maps | Anaushka Goyal</title>

  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="stylesheet" href="/assets/project.css" />
  <link rel="stylesheet" href="/assets/maps.css" />
</head>

<body class="mapsPage">
  <header class="topbar">
    <a class="brand" href="/" aria-label="Home">AG</a>
    <nav class="topnav" aria-label="Primary">
      <a href="/projects/">Projects</a>
      <a class="isActive" href="/maps/">Maps</a>
      <a href="/about/">About</a>
    </nav>
  </header>

  <main class="mapsWrap">
    <div class="mapsHead">
      <h1 class="mapsTitle">Maps</h1>
      <p class="mapsSub">
        A curated set of cartographic outputs — click any map to view it full-size with context and tools used.
      </p>
    </div>

    <section class="mapsGrid" aria-label="Map gallery">
      <!-- Card 1 -->
      <a class="mapCard" href="/maps/m01-pa-signals/">
        <img class="mapThumb" src="/maps/m01-pa-signals/thumb.jpg" alt="PA Signals map thumbnail" />
        <div class="mapCardMeta">
          <div class="mapCardTitle">PA Signals</div>
          <div class="mapCardDesc">GeoJSON → styled thematic map + layout export.</div>
        </div>
      </a>

      <!-- Card 2 -->
      <a class="mapCard" href="/maps/m02-tarragona-landuse/">
        <img class="mapThumb" src="/maps/m02-tarragona-landuse/thumb.jpg" alt="Tarragona Land Use map thumbnail" />
        <div class="mapCardMeta">
          <div class="mapCardTitle">Tarragona Land Use</div>
          <div class="mapCardDesc">Land use classification + corridor interpretation.</div>
        </div>
      </a>

      <!-- Duplicate cards as you add more maps -->
    </section>
  </main>
</body>
</html>
